<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 16px;">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #E1306C;">
        <h3 style="margin: 0; background: linear-gradient(45deg, #833AB4, #FD1D1D, #F77737); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">Instagram Integration</h3>
        <span data-ig="status-badge" style="padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; background: #fce4ec; color: #c62828;">Checking...</span>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px;">
        <div data-ig="stat-posts" style="background: var(--bg-secondary, #f5f5f5); padding: 10px; border-radius: 6px; text-align: center;">
            <div style="font-size: 18px; font-weight: 700; color: #E1306C;">--</div>
            <div style="font-size: 11px; color: var(--text-secondary, #888);">Posts Published</div>
        </div>
        <div data-ig="stat-calls" style="background: var(--bg-secondary, #f5f5f5); padding: 10px; border-radius: 6px; text-align: center;">
            <div style="font-size: 18px; font-weight: 700; color: #833AB4;">--</div>
            <div style="font-size: 11px; color: var(--text-secondary, #888);">API Calls (this hour)</div>
        </div>
        <div data-ig="stat-limit" style="background: var(--bg-secondary, #f5f5f5); padding: 10px; border-radius: 6px; text-align: center;">
            <div style="font-size: 18px; font-weight: 700; color: #F77737;">200</div>
            <div style="font-size: 11px; color: var(--text-secondary, #888);">Hourly Limit</div>
        </div>
    </div>

    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
        <button data-ig="test-btn" style="background: #E1306C; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">Test Connection</button>
    </div>

    <div data-ig="info" style="font-size: 11px; color: var(--text-secondary, #888);"></div>
</div>

<script>
(function() {
    const fetchApi = globalThis.fetchApi || fetch;
    const API_TEST = '/api/plugins/instagram/instagram_test';

    function $(sel) { return document.querySelector('[data-ig="' + sel + '"]'); }

    async function testConnection() {
        const badge = $('status-badge');
        badge.textContent = 'Testing...';
        badge.style.background = '#fff3e0';
        badge.style.color = '#e65100';
        try {
            const resp = await fetchApi(API_TEST, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: '{}'
            });
            const data = await resp.json();
            if (data.ok) {
                badge.textContent = 'Connected' + (data.user ? ' as ' + data.user : '');
                badge.style.background = '#e8f5e9';
                badge.style.color = '#2e7d32';
                if (data.usage) {
                    const posts = $('stat-posts');
                    const calls = $('stat-calls');
                    if (posts) posts.querySelector('div').textContent = data.usage.posts_published || 0;
                    if (calls) calls.querySelector('div').textContent = data.usage.api_calls || 0;
                }
                $('info').textContent = data.user || '';
            } else {
                badge.textContent = data.error || 'Error';
                badge.style.background = '#fce4ec';
                badge.style.color = '#c62828';
            }
        } catch (e) {
            badge.textContent = 'API unavailable';
            badge.style.background = '#fce4ec';
            badge.style.color = '#c62828';
        }
    }

    $('test-btn').addEventListener('click', testConnection);
    testConnection();
})();
</script>
