<html>
<head><title>Instagram</title></head>
<body>
    <div x-data="{ activeTab: 'credentials' }" x-init="
        if (!config.access_token) config.access_token = '';
        if (!config.ig_user_id) config.ig_user_id = '';
        if (!config.defaults) config.defaults = {};
        if (!config.defaults.max_results) config.defaults.max_results = 25;
        if (!config.defaults.caption_max_length) config.defaults.caption_max_length = 2200;
        if (!config.memory) config.memory = {};
        if (config.memory.auto_save === undefined) config.memory.auto_save = true;
        if (!config.security) config.security = {};
        if (!config.security.max_content_length) config.security.max_content_length = 4000;
    ">
        <template x-if="config">
            <div>
                <!-- Tab Navigation -->
                <div style="display: flex; gap: 0; border-bottom: 2px solid var(--border-color, #e0e0e0); margin-bottom: 16px;">
                    <template x-for="tab in ['credentials', 'defaults', 'security']">
                        <button @click="activeTab = tab"
                            :style="'padding: 8px 16px; border: none; background: none; cursor: pointer; font-size: 12px; font-weight: 600; margin-bottom: -2px; color: ' + (activeTab === tab ? '#E1306C' : 'var(--text-secondary, #888)') + '; border-bottom: 2px solid ' + (activeTab === tab ? '#E1306C' : 'transparent')"
                            x-text="tab.charAt(0).toUpperCase() + tab.slice(1)"></button>
                    </template>
                </div>

                <!-- Credentials Tab -->
                <div x-show="activeTab === 'credentials'">
                    <div class="section-description">Need help? See the <a href="https://github.com/spinnakergit/a0-instagram/blob/main/docs/SETUP.md" target="_blank" style="color: #E1306C;">Setup Guide</a> for step-by-step instructions.</div>

                    <div class="section-title">Instagram Authentication</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Access Token</div>
                            <div class="field-description">Long-lived access token from Facebook Login (valid 60 days, auto-refreshable).</div>
                        </div>
                        <div class="field-control">
                            <input type="password" x-model="config.access_token" placeholder="Enter your long-lived access token">
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Instagram User ID</div>
                            <div class="field-description">Your Instagram Business/Creator account numeric ID (found via Graph API Explorer).</div>
                        </div>
                        <div class="field-control">
                            <input type="text" x-model="config.ig_user_id" placeholder="e.g., 17841400123456789">
                        </div>
                    </div>

                    <div style="padding: 10px; background: var(--bg-secondary, #f5f5f5); border-radius: 6px; font-size: 12px;">
                        <strong>Quick Setup:</strong>
                        <ol style="margin: 4px 0 0 0; padding-left: 20px;">
                            <li>Create a Facebook App at <code>developers.facebook.com</code></li>
                            <li>Add the Instagram Graph API product</li>
                            <li>Link your Instagram Business/Creator account to a Facebook Page</li>
                            <li>Generate a User Access Token with required permissions</li>
                            <li>Exchange the short-lived token for a long-lived token</li>
                            <li>Enter the token and your Instagram User ID above</li>
                        </ol>
                    </div>
                </div>

                <!-- Defaults Tab -->
                <div x-show="activeTab === 'defaults'">
                    <div class="section-title">Content Defaults</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Max Results</div>
                            <div class="field-description">Maximum items returned per feed/media query (1-100).</div>
                        </div>
                        <div class="field-control">
                            <input type="number" min="1" max="100" x-model.number="config.defaults.max_results">
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Caption Max Length</div>
                            <div class="field-description">Maximum characters per caption (1-2200).</div>
                        </div>
                        <div class="field-control">
                            <input type="number" min="1" max="2200" x-model.number="config.defaults.caption_max_length">
                        </div>
                    </div>

                    <div class="section-title">Memory</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Auto-save to memory</div>
                            <div class="field-description">Automatically save research summaries to agent memory.</div>
                        </div>
                        <div class="field-control">
                            <label class="toggle"><input type="checkbox" x-model="config.memory.auto_save"><span class="toggler"></span></label>
                        </div>
                    </div>
                </div>

                <!-- Security Tab -->
                <div x-show="activeTab === 'security'">
                    <div class="section-title">Security Settings</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Max Content Length</div>
                            <div class="field-description">Maximum characters per content input (1-4000).</div>
                        </div>
                        <div class="field-control">
                            <input type="number" min="1" max="4000" x-model.number="config.security.max_content_length">
                        </div>
                    </div>

                    <div style="font-size: 12px; color: var(--text-secondary, #888); padding: 4px 0 8px;">
                        Input sanitization and prompt injection defense are always active.
                    </div>
                </div>
            </div>
        </template>
    </div>
</body>
</html>
